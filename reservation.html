<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reservation | Cham</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <style>
        :root{--navy:#0a1928;--gold:#d4af37;--white:#fff;--gray-light:#e9ecef;--font-body:'Poppins',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-body);background:var(--white)}
        .container{max-width:1280px;margin:0 auto;padding:0 24px}
        .btn{background:var(--gold);color:var(--navy);padding:14px 36px;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-weight:600}
        .nav{position:fixed;width:100%;top:0;z-index:1000;padding:20px 0;background:transparent}
        .nav-scrolled{background:var(--navy);padding:12px 0}
        .nav .container{display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.8rem;font-weight:700;font-family:'Playfair Display',serif;color:white;text-decoration:none}
        .logo span{color:var(--gold)}
        .nav-links{display:flex;gap:2rem;list-style:none}
        .nav-links a{color:white;text-decoration:none;font-weight:500}
        .nav-links a:hover,.nav-links a.active{color:var(--gold)}
        .mobile-menu{display:none;font-size:1.8rem;color:white;background:none;border:none;cursor:pointer}
        .res-hero{height:40vh;background:linear-gradient(rgba(10,25,40,0.6),rgba(10,25,40,0.7)),url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') no-repeat center/cover;display:flex;align-items:center;text-align:center;color:white}
        .res-hero h1{font-size:3rem}
        .reservation-form{max-width:750px;margin:60px auto;background:white;padding:50px;border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,0.08);border:1px solid var(--gray-light)}
        .form-group{margin-bottom:25px}
        .form-group label{display:block;margin-bottom:8px;font-weight:600}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:14px 18px;border:1px solid var(--gray-light);border-radius:14px;font-family:var(--font-body);font-size:1rem}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(212,175,55,0.2)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:25px}
        .footer{background:var(--navy);color:white;text-align:center;padding:40px 0;margin-top:60px}
        @media(max-width:768px){.mobile-menu{display:block}.nav-links{position:fixed;top:70px;left:-100%;width:80%;height:calc(100vh - 70px);background:var(--navy);flex-direction:column;align-items:center;padding-top:40px;transition:left 0.3s}.nav-links.active{left:0}.res-hero h1{font-size:2rem}.form-row{grid-template-columns:1fr}.reservation-form{padding:25px}}
    </style>
    <link rel="stylesheet" href="style.css" media="print" onload="this.media='all'">
</head>
<body>
    <nav class="nav"><div class="container"><a href="index.html" class="logo">Cham<span>.</span></a><button class="mobile-menu">☰</button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="menu.html">Menu</a></li><li><a href="reservation.html" class="active">Reservation</a></li><li><a href="contact.html">Contact</a></li></ul></div></nav>
    <section class="res-hero"><div class="container"><h1>Reserve Your Table</h1><p>Oceanfront dining – book your unforgettable experience</p></div></section>
    <div class="container">
        <form id="reservation-form" class="reservation-form" action="#" method="POST">
            <div class="form-row"><div class="form-group"><label>First Name *</label><input type="text" name="first_name" required></div><div class="form-group"><label>Last Name *</label><input type="text" name="last_name" required></div></div>
            <div class="form-group"><label>Email Address *</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Phone Number *</label><input type="tel" name="phone" required></div>
            <div class="form-row"><div class="form-group"><label>Date *</label><input type="date" name="date" required></div><div class="form-group"><label>Time *</label><input type="time" name="time" required></div></div>
            <div class="form-row"><div class="form-group"><label>Guests *</label><select name="guests" required><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8+</option></select></div><div class="form-group"><label>Occasion</label><select name="occasion"><option>--</option><option>Birthday</option><option>Anniversary</option><option>Business</option><option>Romantic Dinner</option></select></div></div>
            <div class="form-group"><label>Special Requests (dietary, allergies, preferences)</label><textarea name="requests" rows="3" placeholder="Let us know how we can make your experience perfect..."></textarea></div>
            <button type="submit" class="btn" style="width:100%">Confirm Reservation</button>
        </form>
    </div>
    <footer class="footer"><div class="container"><p>© 2025 Cham – Santa Maria, Cape Verde | +238 913 98 48</p><div class="social-links"><a href="#">📘</a><a href="#">📷</a><a href="#">🐦</a></div></div></footer>
    <script src="script.js" defer></script>
</body>
</html>
